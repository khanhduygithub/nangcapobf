name: Extract and Show on GitHub

on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Extract zip
      run: unzip -o binscurez.zip -d ./
    
    - name: Commit extracted files
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Extracted files" || echo "No changes"
        git push
